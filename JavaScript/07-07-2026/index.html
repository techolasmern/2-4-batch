<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS - Events</title>
    <style>
        #cursor_follower{
            width: 15px;
            height: 15px;
            background-color: rgb(39, 199, 21);
            position: fixed;
            pointer-events: none;
            transition: 0.2s all linear;
            border-radius: 15px;
        }
        .custom-context-menu{
            position: fixed;
            top: 50px;
            left: 300px;
            background-color: white;
            box-shadow: 0px 0px 2px rgba(0, 0, 0, 0.5);
            padding: 10px;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 200px;
            border-radius: 10px;
            display: none;
        }

        .custom-context-menu span{
            padding: 5px;
        }
        .custom-context-menu span:hover{
            background-color: #f0f0f0;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <section id="contextMenu" class="custom-context-menu">
        <span>Page Info</span>
        <span>Copy</span>
        <span>Paste</span>
        <span>Cut</span>
        <span>Delete</span>
    </section>

    <button id="btn">Click Me</button>
    <button id="btn_1">Sample Drag check</button>

    <div id="cursor_follower"></div>

    <div id="container" style="height: 200px; width: 200px; background-color: red;"></div>
    <script src="script.js"></script>
</body>
</html>
