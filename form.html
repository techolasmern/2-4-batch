<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="submitted.html">
      
         <label>Username:</label><br>
        <input type="text" placeholder="Eg: @user_123" name="username"><br>
        <label>Password:</label><br>
        <input type="password" placeholder="****" name="password">
        <button>Login</button>
    </form>

    <input type="color">
    <input type="file">
    <br><br>
    <input type="checkbox" name="course" value="mern"> MERN STACK
    <br>
    <input type="checkbox" name="course" value="da"> DATA ANALYST
    
    <br><br>
    <input type="radio" name="gender" value="male"> Male
    <br>
    <input type="radio" name="gender" value="female"> Female
    <br>
    <input type="radio" name="gender" value="other"> Other
    <br><br>

    <form>
        <input type="email" placeholder="Eg: sample@gmail.com" required>
        <input type="number" placeholder="Eg: 9876543210" required>
        <input type="search" required>
        <input type="datetime-local" required>
        <input type="reset" value="reset" required>
        <input type="hidden" name="course" value="mern" required>
        <input type="url" placeholder="Eg: https://www.tech.com/" required>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
